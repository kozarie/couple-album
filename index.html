<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ふたりのアルバム</title>
<style>
  :root {
    --bg: #faf8f5;
    --surface: #ffffff;
    --border: #ede8e1;
    --accent: #c9a48a;
    --accent-light: #f5ede5;
    --text: #3d3530;
    --text-sub: #9a8c84;
    --shadow: 0 2px 16px rgba(100,70,50,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── セットアップ画面 ── */
  #setup-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 32px 24px;
  }
  .setup-card {
    background: var(--surface);
    border-radius: 24px;
    padding: 40px 32px;
    width: 100%;
    max-width: 400px;
    box-shadow: var(--shadow);
    text-align: center;
  }
  .setup-card .heart { font-size: 2.5rem; margin-bottom: 16px; }
  .setup-card h2 { font-size: 1.4rem; margin-bottom: 8px; color: var(--text); }
  .setup-card p { font-size: 0.9rem; color: var(--text-sub); margin-bottom: 28px; }
  .name-row {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 24px;
  }
  .name-row input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid var(--border);
    border-radius: 12px;
    font-size: 1rem;
    outline: none;
    transition: border 0.2s;
    text-align: center;
  }
  .name-row input:focus { border-color: var(--accent); }
  .name-row .amp { color: var(--accent); font-size: 1.1rem; font-weight: bold; text-align: center; }
  .btn-primary {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-primary:hover { opacity: 0.85; }

  /* ── メイン画面 ── */
  #main-screen { display: none; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-title {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-title .names {
    font-size: 1rem;
    font-weight: bold;
    color: var(--text);
  }
  .header-title .heart-sm { color: var(--accent); font-size: 1.1rem; }
  .header-sub { font-size: 0.75rem; color: var(--text-sub); }

  .add-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 18px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 20px;
    font-size: 0.9rem;
    font-weight: bold;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .add-btn:hover { opacity: 0.85; }

  /* ── フィルタータブ ── */
  .filter-bar {
    padding: 16px 24px 0;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .filter-tab {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: white;
    color: var(--text-sub);
    font-size: 0.82rem;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.2s;
  }
  .filter-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* ── フォトグリッド ── */
  .grid-container {
    padding: 20px 24px 100px;
    columns: 2;
    gap: 12px;
  }
  @media (min-width: 600px) { .grid-container { columns: 3; } }
  @media (min-width: 900px) { .grid-container { columns: 4; } }

  .memory-card {
    break-inside: avoid;
    background: var(--surface);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: var(--shadow);
    margin-bottom: 12px;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .memory-card:hover { transform: translateY(-2px); }
  .memory-card img {
    width: 100%;
    display: block;
    object-fit: cover;
  }
  .card-info {
    padding: 10px 12px 12px;
  }
  .card-title {
    font-size: 0.88rem;
    font-weight: bold;
    color: var(--text);
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-meta {
    font-size: 0.75rem;
    color: var(--text-sub);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .card-author {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 0.7rem;
    font-weight: bold;
  }
  .author-a { background: #fde8d8; color: #b5613a; }
  .author-b { background: #dde8fd; color: #3a61b5; }

  /* ── 空状態 ── */
  .empty-state {
    text-align: center;
    padding: 80px 24px;
    color: var(--text-sub);
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 16px; }
  .empty-state p { font-size: 0.95rem; line-height: 1.7; }

  /* ── モーダル共通 ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(50,35,25,0.5);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 24px;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 8px 40px rgba(50,35,25,0.2);
  }
  .modal-header {
    padding: 20px 24px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .modal-header h3 { font-size: 1.1rem; }
  .close-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    background: var(--bg);
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── 追加モーダル ── */
  .add-modal-body { padding: 0 24px 24px; }
  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block;
    font-size: 0.82rem;
    font-weight: bold;
    color: var(--text-sub);
    margin-bottom: 6px;
  }
  .form-group input[type="text"],
  .form-group input[type="date"],
  .form-group textarea {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid var(--border);
    border-radius: 12px;
    font-size: 0.95rem;
    font-family: inherit;
    outline: none;
    resize: vertical;
    transition: border 0.2s;
  }
  .form-group input:focus,
  .form-group textarea:focus { border-color: var(--accent); }

  .author-select {
    display: flex;
    gap: 10px;
  }
  .author-btn {
    flex: 1;
    padding: 10px;
    border-radius: 12px;
    border: 2px solid var(--border);
    background: white;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: bold;
    transition: all 0.2s;
    text-align: center;
  }
  .author-btn.selected-a { border-color: #b5613a; background: #fde8d8; color: #b5613a; }
  .author-btn.selected-b { border-color: #3a61b5; background: #dde8fd; color: #3a61b5; }

  .photo-upload-area {
    display: block;
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition: border 0.2s;
  }
  .photo-upload-area:hover { border-color: var(--accent); }
  .photo-upload-area .upload-icon { font-size: 2rem; margin-bottom: 8px; }
  .photo-upload-area p { font-size: 0.85rem; color: var(--text-sub); }
  #photoInput { display: none; }
  .preview-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }
  .preview-grid img {
    width: 72px;
    height: 72px;
    object-fit: cover;
    border-radius: 8px;
    border: 2px solid var(--border);
  }
  .preview-count {
    font-size: 0.8rem;
    color: var(--accent);
    font-weight: bold;
    margin-top: 6px;
  }

  /* ── 詳細モーダル ── */
  #detail-modal .modal { max-width: 540px; }
  .detail-photo {
    width: 100%;
    max-height: 380px;
    object-fit: contain;
    background: #f0ebe4;
    display: block;
  }
  .detail-body { padding: 20px 24px 24px; }
  .detail-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 8px; }
  .detail-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    font-size: 0.82rem;
    color: var(--text-sub);
  }
  .detail-memory {
    background: var(--accent-light);
    border-left: 3px solid var(--accent);
    border-radius: 0 12px 12px 0;
    padding: 14px 16px;
    font-size: 0.92rem;
    line-height: 1.75;
    color: var(--text);
    white-space: pre-wrap;
  }
  .detail-memory-label {
    font-size: 0.75rem;
    font-weight: bold;
    color: var(--accent);
    margin-bottom: 10px;
  }
  .detail-delete {
    margin-top: 16px;
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: 1.5px solid #e0b0b0;
    background: white;
    color: #c05050;
    font-size: 0.85rem;
    cursor: pointer;
  }
  .detail-delete:hover { background: #fff0f0; }

  /* ── ヘッダーボタン群 ── */
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .icon-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: white;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .icon-btn:hover { background: var(--accent-light); }

  /* ── 設定モーダル ── */
  .settings-body { padding: 0 24px 24px; }
  .settings-section {
    margin-bottom: 24px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .settings-section:last-child { border-bottom: none; margin-bottom: 0; }
  .settings-section h4 { font-size: 0.82rem; color: var(--text-sub); font-weight: bold; margin-bottom: 12px; }
  .share-url {
    background: var(--bg);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 0.82rem;
    color: var(--text-sub);
    word-break: break-all;
    margin-bottom: 10px;
    border: 1px solid var(--border);
  }
  .btn-share {
    width: 100%; padding: 12px;
    background: #4a9c6e; color: white;
    border: none; border-radius: 12px;
    font-size: 0.95rem; font-weight: bold;
    cursor: pointer; transition: opacity 0.2s;
  }
  .btn-share:hover { opacity: 0.85; }
  .btn-danger {
    width: 100%; padding: 12px;
    background: white; color: #c05050;
    border: 1.5px solid #e0b0b0;
    border-radius: 12px; font-size: 0.95rem;
    font-weight: bold; cursor: pointer;
    transition: background 0.2s;
  }
  .btn-danger:hover { background: #fff0f0; }
</style>
</head>
<body>

<!-- ── セットアップ画面 ── -->
<div id="setup-screen">
  <div class="setup-card">
    <div class="heart">💝</div>
    <h2>ふたりのアルバム</h2>
    <p>お互いの名前を入力してはじめましょう</p>
    <div class="name-row">
      <input type="text" id="nameA" placeholder="あなたの名前" maxlength="10">
      <span class="amp">&</span>
      <input type="text" id="nameB" placeholder="相手の名前" maxlength="10">
    </div>
    <button class="btn-primary" onclick="startApp()">アルバムをはじめる</button>
  </div>
</div>

<!-- ── メイン画面 ── -->
<div id="main-screen">
  <header>
    <div class="header-title">
      <div>
        <div class="names">
          <span id="headerNameA">—</span>
          <span class="heart-sm"> ♥ </span>
          <span id="headerNameB">—</span>
        </div>
        <div class="header-sub" id="headerCount">思い出 0 件</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="shareApp()" title="共有">🔗</button>
      <button class="icon-btn" onclick="openSettings()" title="設定">⚙️</button>
      <button class="add-btn" onclick="openAddModal()">＋ 追加</button>
    </div>
  </header>

  <div class="filter-bar">
    <button class="filter-tab active" onclick="setFilter('all', this)">すべて</button>
    <button class="filter-tab" id="filterA" onclick="setFilter('a', this)">—</button>
    <button class="filter-tab" id="filterB" onclick="setFilter('b', this)">—</button>
  </div>

  <div class="grid-container" id="photoGrid"></div>
</div>

<!-- ── 追加モーダル ── -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>思い出を追加</h3>
      <button class="close-btn" onclick="closeAddModal()">✕</button>
    </div>
    <div class="add-modal-body">
      <div class="form-group">
        <label>投稿者</label>
        <div class="author-select">
          <button class="author-btn" id="btnA" onclick="selectAuthor('a')">—</button>
          <button class="author-btn" id="btnB" onclick="selectAuthor('b')">—</button>
        </div>
      </div>
      <div class="form-group">
        <label>写真</label>
        <input type="file" id="photoInput" accept="image/*" multiple onchange="previewPhoto(event)">
        <label for="photoInput" class="photo-upload-area">
          <div class="upload-icon">📷</div>
          <p>タップして写真を選ぶ（複数選択OK）</p>
          <div class="preview-grid" id="previewGrid"></div>
          <div class="preview-count" id="previewCount"></div>
        </label>
      </div>
      <div class="form-group">
        <label>タイトル</label>
        <input type="text" id="inputTitle" placeholder="例：初めてのデート" maxlength="40">
      </div>
      <div class="form-group">
        <label>日付</label>
        <input type="date" id="inputDate">
      </div>
      <div class="form-group">
        <label>思い出メモ</label>
        <textarea id="inputMemory" rows="4" placeholder="このときのことを残しておこう..."></textarea>
      </div>
      <button class="btn-primary" onclick="saveMemory()">保存する</button>
    </div>
  </div>
</div>

<!-- ── 設定モーダル ── -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>設定</h3>
      <button class="close-btn" onclick="closeSettings()">✕</button>
    </div>
    <div class="settings-body">
      <div class="settings-section">
        <h4>🔗 このアプリを共有する</h4>
        <div class="share-url" id="shareUrlText">https://kozarie.github.io/couple-album/</div>
        <button class="btn-share" onclick="shareApp()">リンクを共有・コピー</button>
      </div>
      <div class="settings-section">
        <h4>✏️ 名前を変更する</h4>
        <div class="form-group">
          <label>あなたの名前</label>
          <input type="text" id="editNameA" maxlength="10" style="width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:12px;font-size:0.95rem;outline:none;">
        </div>
        <div class="form-group">
          <label>相手の名前</label>
          <input type="text" id="editNameB" maxlength="10" style="width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:12px;font-size:0.95rem;outline:none;">
        </div>
        <button class="btn-primary" onclick="saveNames()">名前を保存する</button>
      </div>
      <div class="settings-section">
        <h4>🗑️ データの初期化</h4>
        <p style="font-size:0.85rem;color:var(--text-sub);margin-bottom:12px;line-height:1.6;">全ての思い出と名前を削除します。この操作は取り消せません。</p>
        <button class="btn-danger" onclick="resetAll()">全てのデータを初期化する</button>
      </div>
    </div>
  </div>
</div>

<!-- ── 詳細モーダル ── -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal">
    <div class="modal-header" style="padding-bottom:0">
      <h3 id="detail-title-header"></h3>
      <button class="close-btn" onclick="closeDetail()">✕</button>
    </div>
    <img id="detail-photo" class="detail-photo" src="" alt="">
    <div id="detail-photo-scroll" style="display:none;overflow-x:auto;gap:4px;background:#f0ebe4;"></div>
    <div class="detail-body">
      <div class="detail-title" id="detail-title"></div>
      <div class="detail-meta">
        <span class="card-author" id="detail-author"></span>
        <span id="detail-date"></span>
      </div>
      <div id="detail-memory-wrap" style="display:none">
        <div class="detail-memory-label">💌 思い出メモ</div>
        <div class="detail-memory" id="detail-memory"></div>
      </div>
      <button class="detail-delete" onclick="deleteMemory()">この思い出を削除する</button>
    </div>
  </div>
</div>

<script>
let memories = [];
let nameA = '', nameB = '';
let selectedAuthor = 'a';
let photosData = [];
let currentDetailId = null;
let currentFilter = 'all';

// ── 初期化 ──────────────────────────────────────────
function init() {
  try {
    const saved = localStorage.getItem('coupleAlbum');
    if (saved) {
      const data = JSON.parse(saved);
      nameA = data.nameA;
      nameB = data.nameB;
      memories = data.memories || [];
      showMain();
    }
  } catch (e) { /* localStorage 使用不可の環境でも続行 */ }
}

function startApp() {
  nameA = document.getElementById('nameA').value.trim() || 'あなた';
  nameB = document.getElementById('nameB').value.trim() || '相手';
  save();
  showMain();
}

function showMain() {
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'block';
  document.getElementById('headerNameA').textContent = nameA;
  document.getElementById('headerNameB').textContent = nameB;
  document.getElementById('filterA').textContent = nameA;
  document.getElementById('filterB').textContent = nameB;
  document.getElementById('btnA').textContent = nameA;
  document.getElementById('btnB').textContent = nameB;
  // 今日の日付をデフォルトに
  document.getElementById('inputDate').value = new Date().toISOString().slice(0, 10);
  renderGrid();
}

// ── 保存 ────────────────────────────────────────────
function save() {
  try {
    localStorage.setItem('coupleAlbum', JSON.stringify({ nameA, nameB, memories }));
  } catch (e) { /* 容量超過時も続行（データはメモリに残る） */ }
}

// ── グリッド描画 ────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('photoGrid');
  const filtered = currentFilter === 'all'
    ? memories
    : memories.filter(m => m.author === currentFilter);

  document.getElementById('headerCount').textContent = `思い出 ${memories.length} 件`;

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="empty-state" style="column-span:all">
        <div class="icon">📷</div>
        <p>まだ思い出がありません。<br>「＋ 追加」から最初の思い出を残しましょう。</p>
      </div>`;
    return;
  }

  grid.innerHTML = filtered.slice().reverse().map(m => {
    const authorName = m.author === 'a' ? nameA : nameB;
    const authorCls = m.author === 'a' ? 'author-a' : 'author-b';
    const dateStr = m.date ? formatDate(m.date) : '';
    const firstPhoto = (m.photos && m.photos[0]) || m.photo || null;
    const photoCount = m.photos ? m.photos.length : (m.photo ? 1 : 0);
    return `
      <div class="memory-card" onclick="openDetail('${m.id}')">
        ${firstPhoto ? `<img src="${firstPhoto}" alt="${escHtml(m.title)}" loading="lazy">` : ''}
        <div class="card-info">
          <div class="card-title">${escHtml(m.title)}</div>
          <div class="card-meta">
            <span class="card-author ${authorCls}">${escHtml(authorName)}</span>
            <span>${photoCount > 1 ? `📷${photoCount} ` : ''}${dateStr}</span>
          </div>
        </div>
      </div>`;
  }).join('');
}

function formatDate(d) {
  const [y, mo, da] = d.split('-');
  return `${y}年${parseInt(mo)}月${parseInt(da)}日`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── フィルター ──────────────────────────────────────
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderGrid();
}

// ── 追加モーダル ────────────────────────────────────
function openAddModal() {
  selectedAuthor = 'a';
  photosData = [];
  document.getElementById('inputTitle').value = '';
  document.getElementById('inputDate').value = new Date().toISOString().slice(0, 10);
  document.getElementById('inputMemory').value = '';
  document.getElementById('previewGrid').innerHTML = '';
  document.getElementById('previewCount').textContent = '';
  document.getElementById('photoInput').value = '';
  highlightAuthor();
  document.getElementById('add-modal').classList.add('show');
}
function closeAddModal() {
  document.getElementById('add-modal').classList.remove('show');
}

function selectAuthor(who) {
  selectedAuthor = who;
  highlightAuthor();
}
function highlightAuthor() {
  document.getElementById('btnA').className = 'author-btn' + (selectedAuthor === 'a' ? ' selected-a' : '');
  document.getElementById('btnB').className = 'author-btn' + (selectedAuthor === 'b' ? ' selected-b' : '');
}

function resizeImage(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = ev => {
      const original = new Image();
      original.onload = () => {
        const MAX = 1200;
        let w = original.width, h = original.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else { w = Math.round(w * MAX / h); h = MAX; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(original, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.82));
      };
      original.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function previewPhoto(e) {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  photosData = [];
  document.getElementById('previewGrid').innerHTML = '';
  document.getElementById('previewCount').textContent = '処理中...';
  for (const file of files) {
    const data = await resizeImage(file);
    photosData.push(data);
    const img = document.createElement('img');
    img.src = data;
    document.getElementById('previewGrid').appendChild(img);
  }
  document.getElementById('previewCount').textContent = `${photosData.length}枚選択済み`;
}

function saveMemory() {
  const title = document.getElementById('inputTitle').value.trim() || '無題の思い出';
  const date = document.getElementById('inputDate').value;
  const memory = document.getElementById('inputMemory').value.trim();
  const m = {
    id: Date.now().toString(),
    author: selectedAuthor,
    title,
    date,
    memory,
    photos: photosData.length ? photosData : [],
    createdAt: new Date().toISOString()
  };
  memories.push(m);
  save();
  renderGrid();
  closeAddModal();
}

// ── 詳細モーダル ────────────────────────────────────
function openDetail(id) {
  const m = memories.find(x => x.id === id);
  if (!m) return;
  currentDetailId = id;
  const authorName = m.author === 'a' ? nameA : nameB;
  const authorCls = m.author === 'a' ? 'author-a' : 'author-b';
  document.getElementById('detail-title-header').textContent = '';
  const allPhotos = m.photos && m.photos.length ? m.photos : (m.photo ? [m.photo] : []);
  const photoEl = document.getElementById('detail-photo');
  const photoScroll = document.getElementById('detail-photo-scroll');
  if (allPhotos.length === 0) {
    photoEl.style.display = 'none';
    if (photoScroll) photoScroll.style.display = 'none';
  } else if (allPhotos.length === 1) {
    photoEl.src = allPhotos[0];
    photoEl.style.display = 'block';
    if (photoScroll) photoScroll.style.display = 'none';
  } else {
    photoEl.style.display = 'none';
    if (photoScroll) {
      photoScroll.innerHTML = allPhotos.map(p =>
        `<img src="${p}" style="height:260px;width:auto;border-radius:0;flex-shrink:0;object-fit:cover;">`
      ).join('');
      photoScroll.style.display = 'flex';
    }
  }
  document.getElementById('detail-title').textContent = m.title;
  const authorEl = document.getElementById('detail-author');
  authorEl.textContent = authorName;
  authorEl.className = `card-author ${authorCls}`;
  document.getElementById('detail-date').textContent = m.date ? formatDate(m.date) : '';
  const memWrap = document.getElementById('detail-memory-wrap');
  if (m.memory) {
    document.getElementById('detail-memory').textContent = m.memory;
    memWrap.style.display = 'block';
  } else {
    memWrap.style.display = 'none';
  }
  document.getElementById('detail-modal').classList.add('show');
}
function closeDetail() {
  document.getElementById('detail-modal').classList.remove('show');
  currentDetailId = null;
}

function deleteMemory() {
  if (!currentDetailId) return;
  if (!confirm('この思い出を削除しますか？')) return;
  memories = memories.filter(m => m.id !== currentDetailId);
  save();
  renderGrid();
  closeDetail();
}

// ── 設定モーダル ────────────────────────────────────
function openSettings() {
  document.getElementById('editNameA').value = nameA;
  document.getElementById('editNameB').value = nameB;
  document.getElementById('settings-modal').classList.add('show');
}
function closeSettings() {
  document.getElementById('settings-modal').classList.remove('show');
}

function saveNames() {
  const a = document.getElementById('editNameA').value.trim();
  const b = document.getElementById('editNameB').value.trim();
  if (!a || !b) { alert('名前を入力してください'); return; }
  nameA = a; nameB = b;
  save();
  showMain();
  closeSettings();
}

function resetAll() {
  if (!confirm('全ての思い出と名前を削除します。本当によろしいですか？')) return;
  memories = []; nameA = ''; nameB = '';
  try { localStorage.removeItem('coupleAlbum'); } catch(e) {}
  closeSettings();
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'flex';
}

async function shareApp() {
  const url = 'https://kozarie.github.io/couple-album/';
  if (navigator.share) {
    try { await navigator.share({ title: 'ふたりのアルバム', url }); } catch(e) {}
  } else {
    try {
      await navigator.clipboard.writeText(url);
      alert('URLをコピーしました！\n' + url);
    } catch(e) { alert('URL: ' + url); }
  }
}

// オーバーレイクリックで閉じる
document.getElementById('add-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeAddModal();
});
document.getElementById('detail-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeDetail();
});
document.getElementById('settings-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeSettings();
});

init();
</script>
